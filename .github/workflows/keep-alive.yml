# .github/workflows/keep-alive.yml
# Mantiene vivo el proyecto Supabase Free haciendo un request a la base
# todos los días, para que nunca llegue a 7 días de inactividad y se pause.
name: Keep Supabase alive

on:
  schedule:
    # Todos los días a las 12:00 UTC (~09:00 ART). Cambialo si querés.
    - cron: "0 12 * * *"
  workflow_dispatch: {} # permite correrlo a mano desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          echo "Haciendo ping a la base..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/providers?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "Respuesta HTTP: $HTTP_CODE"
          # 200 = ok. Si RLS bloquea la lectura anónima igual cuenta como
          # actividad (la request llega a la DB), así que aceptamos 2xx/4xx
          # de PostgREST como "vivo". Solo fallamos ante errores de red/5xx.
          if [ "$HTTP_CODE" -ge 500 ] || [ "$HTTP_CODE" -eq 000 ]; then
            echo "Error: la base no respondió correctamente."
            exit 1
          fi
          echo "Proyecto activo. ✅"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}